<!DOCTYPE html>
<html>
<head>
    <title>Student Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        section {
            padding: 20px;
        }
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

<header>
    <h1>My College Website</h1>
    <p>Welcome to my student page</p>
</header>

<nav>
    <a href="#about">About</a>
    <a href="#courses">Courses</a>
    <a href="#contact">Contact</a>
</nav>

<section id="about">
    <h2>About Me</h2>
    <p>Hello! I am a college student. I am learning web development.</p>
</section>

<section id="courses">
    <h2>My Courses</h2>
    <ul>
        <li>Computer Science</li>
        <li>Mathematics</li>
        <li>Physics</li>
    </ul>
</section>

<section id="contact">
    <h2>Contact</h2>
    <p>Email: student@example.com</p>
</section>

<footer>
    <p>© 2026 My College Website</p>
</footer>

</body>
</html>
